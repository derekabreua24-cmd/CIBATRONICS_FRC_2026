# Camera calibration properties for UsbAprilTagProcessor
# cameraName can be a human-friendly name for CameraServer
cameraName=usbCam0
# USB device index (integer)
deviceIndex=0
# Camera intrinsics (pixels)
fx=800.0
fy=800.0
cx=320.0
cy=240.0
# Tag size in meters (side length)
tagSizeMeters=0.1524
# Optional camera-to-robot mount translation and rotation (meters / degrees)
# If omitted, identity transform is used.
# cameraTx=0.0
# cameraTy=0.0
# cameraTz=0.2
# cameraRotDegX=0.0
# cameraRotDegY=0.0
# cameraRotDegZ=0.0
