# Camera calibration for UsbAprilTagProcessor (generic USB camera)
# cameraName = name for CameraServer
cameraName=usbCam0
# USB device index (0 = first camera). Use 1 if you have a second USB cam.
deviceIndex=0
# Camera intrinsics (pixels). cx, cy = principal point = IMAGE CENTER (320, 240 for 640x480).
fx=320.0
fy=320.0
cx=320.0
cy=240.0
# Resolution 640x480 (cx, cy must match: 320, 240)
width=640
height=480
# FPS (1-60). Camera may round to a supported rate (e.g. 15, 20, 30).
fps=60
# Tag size in meters (side length). 2026 REBUILT: 6.5 in = 0.1651 m
tagSizeMeters=0.1651
# Optional camera-to-robot mount translation and rotation (meters / degrees)
# If omitted, identity transform is used.
# cameraTx=0.0
# cameraTy=0.0
# cameraTz=0.2
# cameraRotDegX=0.0
# cameraRotDegY=0.0
# cameraRotDegZ=0.0
